name: Passo
options:
  bundleIdPrefix: com.passo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"         # iPhone only
    INFOPLIST_FILE: Passo/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.passo.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  Passo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Passo
        excludes:
          - "**/*.md"
    info:
      path: Passo/Info.plist
      properties:
        CFBundleName: Passo
        CFBundleDisplayName: Passo
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "扫描票据条码和二维码"
        NSPhotoLibraryUsageDescription: "从相册导入票据截图"
    settings:
      base:
        INFOPLIST_FILE: Passo/Info.plist
